      minutes: 5

shell_command:
  git_push: bash /config/git_push.sh
  git_pull: bash /config/git_pull.sh
  c4_diagnostic: python3 /config/c4_diagnostic.py > /config/c4_output.txt 2>&1
  c4_diagnostic2: python3 /config/c4_diagnostic2.py > /config/c4_output2.txt 2>&1
  c4_diagnostic3: bash /config/c4_diagnostic3.sh > /config/www/c4_output3.txt 2>&1
  c4_set_code: python3 /config/c4_manage_codes.py set {{ slot }} {{ code }} {{ name }}
  c4_clear_code: python3 /config/c4_manage_codes.py clear {{ slot }}
  c4_entry_log: python3 /config/c4_entry_log.py >> /config/www/entry_log_debug.txt 2>&1

###############################################################################
# INPUT TEXT HELPERS — DS3 Code Slot Trackers
# Stores which code is currently programmed in each C4 DS3 slot.
# Format: "CODE:CustomerName" e.g. "972707:Athlete Julian"
# Empty string = slot is free
# Bay 1: slots 11/12/13, Bay 2: 14/15/16, Bay 3: 17/18/19
# Bay 4: 20/21/22,       Bay 5: 23/24/25
###############################################################################
input_text:
  # Bay 1
  bay1_code_slot_a:
    name: "Bay 1 Code Slot A (DS3 slot 11)"
    max: 100
    initial: ""
  bay1_code_slot_b:
    name: "Bay 1 Code Slot B (DS3 slot 12)"
    max: 100
    initial: ""
  bay1_code_slot_c:
    name: "Bay 1 Code Slot C (DS3 slot 13)"
    max: 100
    initial: ""
  # Bay 2
  bay2_code_slot_a:
    name: "Bay 2 Code Slot A (DS3 slot 14)"
    max: 100
    initial: ""
  bay2_code_slot_b:
    name: "Bay 2 Code Slot B (DS3 slot 15)"
    max: 100
    initial: ""
  bay2_code_slot_c:
    name: "Bay 2 Code Slot C (DS3 slot 16)"
    max: 100
    initial: ""
  # Bay 3
  bay3_code_slot_a:
    name: "Bay 3 Code Slot A (DS3 slot 17)"
    max: 100
    initial: ""
  bay3_code_slot_b:
    name: "Bay 3 Code Slot B (DS3 slot 18)"
    max: 100
    initial: ""
  bay3_code_slot_c:
    name: "Bay 3 Code Slot C (DS3 slot 19)"
    max: 100
    initial: ""
  # Bay 4
  bay4_code_slot_a:
    name: "Bay 4 Code Slot A (DS3 slot 20)"
    max: 100
    initial: ""
  bay4_code_slot_b:
    name: "Bay 4 Code Slot B (DS3 slot 21)"
    max: 100
    initial: ""
  bay4_code_slot_c:
    name: "Bay 4 Code Slot C (DS3 slot 22)"
    max: 100
    initial: ""
  # Bay 5
  bay5_code_slot_a:
    name: "Bay 5 Code Slot A (DS3 slot 23)"
    max: 100
    initial: ""
  bay5_code_slot_b:
    name: "Bay 5 Code Slot B (DS3 slot 24)"
    max: 100
    initial: ""
  bay5_code_slot_c:
    name: "Bay 5 Code Slot C (DS3 slot 25)"
    max: 100
    initial: ""

