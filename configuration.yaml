sensor:
  - platform: integration
    source: sensor.non_dimmable_light_centralized_power_6
    name: Energy Usage kWh Light Bay1
    unique_id: energy_usage_kwh_light_bay1
    unit_prefix: k
    round: 2
    max_sub_interval:
      minutes: 5
