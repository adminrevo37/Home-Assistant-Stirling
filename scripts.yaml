###############################################################################
##### ROLLER DOOR — Service mode toggle
# Pressing this script/button from the dashboard:
#   - If service mode OFF → sends UNLOCK (opens door) + enables service mode
#   - If service mode ON  → sends LOCK  (closes door) + disables service mode
# While service mode is ON the auto-close automation is suppressed entirely.
###############################################################################
door_service_toggle:
  alias: "Roller Door - Service Toggle"
  description: >
    Open/close the front roller door for service staff.
    Enables service mode (bypasses auto-close) when opening;
    disables it when closing.
  icon: mdi:garage
  sequence:
    - if:
        - condition: state
          entity_id: input_boolean.door_service_mode
          state: 'off'
      then:
        # Currently closed / service mode off → OPEN the door.
        # LOCK resets C4 state to "locked"; the subsequent UNLOCK then
        # triggers the motor.  Plain UNLOCK is a no-op if C4 state is
        # already "unlocked" (can happen after testing or power events).
        - action: shell_command.c4_lock_door
        - delay: "00:00:01"
        - action: shell_command.c4_unlock_door
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.door_service_mode
      else:
        # Currently open / service mode on → CLOSE the door
        # LOCK resets C4 state to "locked"; UNLOCK then triggers the motor.
        # Without LOCK first, C4 sees state already "unlocked" and ignores UNLOCK.
        - action: shell_command.c4_lock_door
        - delay: "00:00:01"
        - action: shell_command.c4_unlock_door
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.door_service_mode
  mode: single

notify_script:
  use_blueprint:
    path: homeassistant/confirmable_notification.yaml
    input:
      notify_device: f40492c148c197d1797526a9689f0fda
      title: LIGHTS still On
      message: CENTRE {{ states('binary_sensor.main_occupancy_status') }}
      confirm_text: TURN OFF
      confirm_action:
      - action: light.turn_off
        metadata: {}
        target:
          label_id: light
          entity_id: light.lights_general
        data: {}
  alias: NOTIFY SCRIPT - Lights
  description: ''
