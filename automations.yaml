- id: auto_git_push
  alias: Auto Push Config to GitHub
  description: Nightly 2am push of HA config changes to GitHub
  triggers:
  - trigger: time
    at: 02:00:00
  actions:
  - action: shell_command.git_push
    response_variable: push_result
  - if:
    - condition: template
      value_template: '{{ push_result.returncode != 0 }}'
    then:
    - action: persistent_notification.create
      data:
        title: GitHub Push Failed
        message: 'Auto-push to GitHub failed at 2am. Your PAT token may have expired.
          Error: {{ push_result.stderr }}

          '
  mode: single
- id: github_deploy_webhook
  alias: Deploy from GitHub
  description: Pulls latest config from GitHub when a push is made to the repo
  triggers:
  - trigger: webhook
    webhook_id: 7k2p9x4m3n8q1r5f
    local_only: false
  actions:
  - action: shell_command.git_pull
  - delay: 00:00:05
  - action: homeassistant.reload_all
  mode: single
- id: sunset_neighbour_activate
  alias: Sunset - Activate Neighbour Highbays
  description: '30 min before sunset: for any active booking, turn on neighbour highbays.
    Bay 1: +hb2 | Bay 2: +hb1,hb3 | Bay 3: +hb2,hb4 | Bay 4: +hb3,hb5 | Bay 5: +hb4

    '
  triggers:
  - trigger: sun
    event: sunset
    offset: -0:30:00
  actions:
  - if:
    - condition: state
      entity_id: input_boolean.bay1_helper
      state: 'on'
    then:
    - action: light.turn_on
      target:
        entity_id: light.highbay_2
  - if:
    - condition: state
      entity_id: input_boolean.bay2_helper
      state: 'on'
    then:
    - action: light.turn_on
      target:
        entity_id:
        - light.highbay_1
        - light.highbay_3
  - if:
    - condition: state
      entity_id: input_boolean.bay3_helper
      state: 'on'
    then:
    - action: light.turn_on
      target:
        entity_id:
        - light.highbay_2
        - light.highbay_4
  - if:
    - condition: state
      entity_id: input_boolean.bay4_helper
      state: 'on'
    then:
    - action: light.turn_on
      target:
        entity_id:
        - light.highbay_3
        - light.highbay_5
  - if:
    - condition: state
      entity_id: input_boolean.bay5_helper
      state: 'on'
    then:
    - action: light.turn_on
      target:
        entity_id: light.highbay_4
  mode: single
- id: night_staggered_shutdown
  alias: Night - All Off + Highbay 3 Residual
  description: 'When all 5 bay helpers are off after dark: turn off highbays 1/2/4/5
    and keep highbay 3 on as the residual safety light while customers pack up. Seamless
    handover, no dark gap. (Was Night - Staggered Shutdown.)'
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.bay1_helper
    - input_boolean.bay2_helper
    - input_boolean.bay3_helper
    - input_boolean.bay4_helper
    - input_boolean.bay5_helper
    to: 'off'
  conditions:
  - condition: sun
    after: sunset
    after_offset: -00:30:00
  - condition: state
    entity_id:
    - input_boolean.bay1_helper
    - input_boolean.bay2_helper
    - input_boolean.bay3_helper
    - input_boolean.bay4_helper
    - input_boolean.bay5_helper
    state: 'off'
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.highbay_1
      - light.highbay_2
      - light.highbay_4
      - light.highbay_5
  - action: light.turn_on
    target:
      entity_id: light.highbay_3
  mode: single
- id: night_highbay3_off
  alias: Night - Highbay 3 Residual Off
  description: After dark with no active bookings, turn off residual highbay 3 once
    occupancy drops below the configured threshold. Re-checking (threshold-cross +
    every 5 min) so an already-empty building is always caught.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.main_occupancy_probability
    below: input_number.lighting_occupancy_threshold
  - trigger: time_pattern
    minutes: /5
  conditions:
  - condition: sun
    after: sunset
    after_offset: -00:30:00
  - condition: state
    entity_id:
    - input_boolean.bay1_helper
    - input_boolean.bay2_helper
    - input_boolean.bay3_helper
    - input_boolean.bay4_helper
    - input_boolean.bay5_helper
    state: 'off'
  - condition: numeric_state
    entity_id: sensor.main_occupancy_probability
    below: input_number.lighting_occupancy_threshold
  - condition: state
    entity_id: light.highbay_3
    state: 'on'
  actions:
  - action: light.turn_off
    target:
      entity_id: light.highbay_3
  mode: single
- id: bay1_code_activate
  alias: Bay 1 - Door Code Activate
  triggers:
  - trigger: calendar
    event: start
    entity_id: calendar.lane_1_bowling_machine
    offset: -0:15:00
  actions:
  - variables:
      door_code: "{{ (trigger.calendar_event.description or '')\n   | regex_findall('DOOR
        CODE: ([\\d ]+)') | first | default('')\n   | replace(' ', '') | trim }}"
      customer_name: "{{ (trigger.calendar_event.description or '')\n   | regex_findall('Customer:
        (.+)') | first | default('Guest') | trim }}"
  - condition: template
    value_template: '{{ door_code != '''' }}'
  - variables:
      slot_to_use: '{% if states(''input_text.bay1_code_slot_a'') == '''' %}11 {%
        elif states(''input_text.bay1_code_slot_b'') == '''' %}12 {% elif states(''input_text.bay1_code_slot_c'')
        == '''' %}13 {% else %}0{% endif %}'
  - condition: template
    value_template: '{{ slot_to_use | int > 0 }}'
  - action: shell_command.c4_set_code
    data:
      slot: '{{ slot_to_use }}'
      code: '{{ door_code }}'
      name: '{{ customer_name }}'
  - if:
    - condition: template
      value_template: '{{ slot_to_use | int == 11 }}'
    then:
    - action: input_text.set_value
      target:
        entity_id: input_text.bay1_code_slot_a
      data:
        value: '{{ door_code }}:{{ customer_name }}'
  - if:
    - condition: template
      value_template: '{{ slot_to_use | int == 12 }}'
    then:
    - action: input_text.set_value
      target:
        entity_id: input_text.bay1_code_slot_b
      data:
        value: '{{ door_code }}:{{ customer_name }}'
  - if:
    - condition: template
      value_template: '{{ slot_to_use | int == 13 }}'
    then:
    - action: input_text.set_value
      target:
        entity_id: input_text.bay1_code_slot_c
      data:
        value: '{{ door_code }}:{{ customer_name }}'
  mode: single
- id: bay1_code_deactivate
  alias: Bay 1 - Door Code Deactivate
  triggers:
  - trigger: calendar
    event: end
    entity_id: calendar.lane_1_bowling_machine
    offset: 0:15:00
  actions:
  - variables:
      door_code: "{{ (trigger.calendar_event.description or '')\n   | regex_findall('DOOR
        CODE: ([\\d ]+)') | first | default('')\n   | replace(' ', '') | trim }}"
  - condition: template
    value_template: '{{ door_code != '''' }}'
  - variables:
      slot_to_clear: '{% if states(''input_text.bay1_code_slot_a'').split('':'')[0]
        == door_code %}11 {% elif states(''input_text.bay1_code_slot_b'').split('':'')[0]
        == door_code %}12 {% elif states(''input_text.bay1_code_slot_c'').split('':'')[0]
        == door_code %}13 {% else %}0{% endif %}'
  - condition: template
    value_template: '{{ slot_to_clear | int > 0 }}'
  - action: shell_command.c4_clear_code
    data:
      slot: '{{ slot_to_clear }}'
  - if:
    - condition: template
      value_template: '{{ slot_to_clear | int == 11 }}'
    then:
    - action: input_text.set_value
      target:
        entity_id: input_text.bay1_code_slot_a
      data:
        value: ''
  - if:
    - condition: template
      value_template: '{{ slot_to_clear | int == 12 }}'
    then:
    - action: input_text.set_value
      target:
        entity_id: input_text.bay1_code_slot_b
      data:
        value: ''
  - if:
    - condition: template
      value_template: '{{ slot_to_clear | int == 13 }}'
    then:
    - action: input_text.set_value
      target:
        entity_id: input_text.bay1_code_slot_c
      data:
        value: ''
  mode: single
