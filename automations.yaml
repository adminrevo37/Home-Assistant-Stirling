- id: '1773291498207'
  alias: Booking BAY1 Access - Webhook
  description: Open Door Turn on Lights
  triggers:
  - trigger: webhook
    allowed_methods:
    - POST
    - PUT
    local_only: true
    webhook_id: -jWhm-ATigP7s_EHhGwXxgROk
  conditions:
  - condition: state
    entity_id: input_boolean.bay1_blocked
    state:
    - 'off'
  actions:
  - action: script.bay1_activate_script
    metadata: {}
    data: {}
  - action: input_boolean.turn_on
    metadata: {}
    target:
      entity_id: input_boolean.bay1_helper
    data: {}
  mode: single
- id: '1779256315851'
  alias: Lights ON Nobody There
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.main_occupancy_probability
    for:
      hours: 1
      minutes: 0
      seconds: 0
    below: 30
  conditions:
  - condition: state
    entity_id:
    - light.office_downlights
    - light.fluro_x_4
    - light.inside_wall_lights
    - light.mezzanine_wall_lights
    - light.outside_wall_lights
    - light.exhaust_fan_1
    - light.exhaust_fan_2
    - light.highbay_1
    - light.highbay_2
    - light.highbay_3
    - light.highbay_4
    - light.highbay_5
    state:
    - 'on'
    for:
      hours: 1
      minutes: 0
      seconds: 0
  actions:
  - action: script.notify_script
    metadata: {}
    data: {}
  mode: single
