###############################################################################
# BAY 1 — BOOKING START
# Fires 5 min before booking. Turns on highbay 1 + common lights.
# Night mode (within 30 min of sunset or sun below horizon): also turns on
# neighbour highbay 2.
# Extracts customer name and door code from calendar event for notification.
###############################################################################
- id: 'bay1_booking_start'
  alias: Bay 1 Booking - START
  description: >
    5 min before booking: turn on highbay 1 and common lights.
    Night mode: also turns on neighbour highbay 2.
  triggers:
    - trigger: calendar
      event: start
      entity_id: calendar.lane_1_bowling_machine
      offset: "-0:05:00"
  conditions:
    - condition: state
      entity_id: input_boolean.bay1_blocked
      state: 'off'
  actions:
    - variables:
        door_code: >-
          {{ (trigger.calendar_event.description or '')
             | regex_findall('DOOR CODE: (\d+)') | first | default('') }}
        customer_name: >-
          {{ (trigger.calendar_event.description or '')
             | regex_findall('Customer: (.+)') | first | default('Guest') | trim }}
        booking_title: "{{ trigger.calendar_event.summary | default('Booking') }}"
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.bay1_helper
    - action: light.turn_on
      target:
        entity_id: light.highbay_1
    - action: light.turn_on
      target:
        entity_id:
          - light.inside_wall_lights
          - light.fluro_x_4
          - light.mezzanine_wall_lights
    # Night mode: also turn on neighbour highbay 2
    - if:
        - condition: template
          value_template: >-
            {{ is_state('sun.sun', 'below_horizon') or
               (is_state('sun.sun', 'above_horizon') and
                (as_timestamp(state_attr('sun.sun', 'next_setting')) - as_timestamp(now())) < 1800) }}
      then:
        - action: light.turn_on
          target:
            entity_id: light.highbay_2
    # Notification disabled - re-enable and set target device when ready
    # - action: notify.notify
    #   data:
    #     title: "Bay 1 - Starting in 5 min"
    #     message: >-
    #       {{ customer_name }} | {{ booking_title }}.
    #       {% if door_code != '' %}Door code: {{ door_code }}.{% endif %}
  mode: single

###############################################################################
# BAY 1 — BOOKING END
# Fires 5 min after booking ends.
# Day mode: turns off highbay 1; common lights off only if all bays empty.
# Night mode: neighbour-aware highbay turn-off; common lights managed by
#             occupancy automation, not here.
###############################################################################
- id: 'bay1_booking_end'
  alias: Bay 1 Booking - END
  description: >
    5 min after booking: turn off highbay 1 (neighbour-aware at night).
    Common lights off only when all bays empty (day mode only).
  triggers:
    - trigger: calendar
      event: end
      entity_id: calendar.lane_1_bowling_machine
      offset: "0:05:00"
  actions:
    # Back-to-back check: abort if another booking is already running on Bay 1
    - condition: template
      value_template: "{{ is_state('calendar.lane_1_bowling_machine', 'off') }}"
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.bay1_helper
    - if:
        # DAY MODE: sun is up and more than 30 min to sunset
        - condition: template
          value_template: >-
            {{ is_state('sun.sun', 'above_horizon') and
               (as_timestamp(state_attr('sun.sun', 'next_setting')) - as_timestamp(now())) > 1800 }}
      then:
        - action: light.turn_off
          target:
            entity_id: light.highbay_1
        # Turn off common lights only if all 5 bays are now empty
        - if:
            - condition: template
              value_template: >-
                {{ is_state('input_boolean.bay1_helper', 'off') and
                   is_state('input_boolean.bay2_helper', 'off') and
                   is_state('input_boolean.bay3_helper', 'off') and
                   is_state('input_boolean.bay4_helper', 'off') and
                   is_state('input_boolean.bay5_helper', 'off') }}
          then:
            - action: light.turn_off
              target:
                entity_id:
                  - light.inside_wall_lights
                  - light.fluro_x_4
                  - light.mezzanine_wall_lights
      else:
        # NIGHT MODE: neighbour-aware turn-off
        # hb1 off when bay1 + bay2 both done (bay1 and bay2 are its coverage zone)
        - if:
            - condition: template
              value_template: >-
                {{ is_state('input_boolean.bay1_helper', 'off') and
                   is_state('input_boolean.bay2_helper', 'off') }}
          then:
            - action: light.turn_off
              target:
                entity_id: light.highbay_1
        # hb2 off when bay1 + bay2 + bay3 all done
        - if:
            - condition: template
              value_template: >-
                {{ is_state('input_boolean.bay1_helper', 'off') and
                   is_state('input_boolean.bay2_helper', 'off') and
                   is_state('input_boolean.bay3_helper', 'off') }}
          then:
            - action: light.turn_off
              target:
                entity_id: light.highbay_2
  mode: single

