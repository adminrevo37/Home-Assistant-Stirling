- id: bay1_booking_start
  alias: Bay 1 Booking - START
  description: '7 min before booking: turn on highbay 1 + bay-1 helper (if not blocked).
    Neighbour highbays handled by the night-neighbour automation; common lights by
    door-open/occupancy.'
  triggers:
  - trigger: calendar
    event: start
    entity_id: calendar.lane_1_bowling_machine
    offset: -0:07:00
  conditions:
  - condition: state
    entity_id: input_boolean.bay1_blocked
    state: 'off'
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.bay1_helper
  - action: light.turn_on
    target:
      entity_id: light.highbay_1
  mode: single
- id: bay1_booking_end
  alias: Bay 1 Booking - END
  description: '5 min after booking: turn off highbay 1 (neighbour-aware at night).
    Common lights handled separately; highbay 3 reserved as night residual.'
  triggers:
  - trigger: calendar
    event: end
    entity_id: calendar.lane_1_bowling_machine
    offset: 0:05:00
  actions:
  - condition: state
    entity_id: calendar.lane_1_bowling_machine
    state: 'off'
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.bay1_helper
  - if:
    - condition: sun
      after: sunset
      after_offset: -00:30:00
    then:
    - if:
      - condition: state
        entity_id:
        - input_boolean.bay1_helper
        - input_boolean.bay2_helper
        state: 'off'
      then:
      - action: light.turn_off
        target:
          entity_id: light.highbay_1
    - if:
      - condition: state
        entity_id:
        - input_boolean.bay1_helper
        - input_boolean.bay2_helper
        - input_boolean.bay3_helper
        state: 'off'
      then:
      - action: light.turn_off
        target:
          entity_id: light.highbay_2
    else:
    - action: light.turn_off
      target:
        entity_id: light.highbay_1
  mode: single
