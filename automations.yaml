###############################################################################
# BAY 1 - NATIVE CALENDAR AUTOMATION (replaces Blackshome blueprint)
# Fires 5 min before booking start; extracts door code from event description
###############################################################################

- id: 'bay1_booking_start'
  alias: Bay 1 Booking - START
  description: >
    5 minutes before booking: program door code from calendar event,
    turn on lights, send notification.
  triggers:
    - trigger: calendar
      event: start
      entity_id: calendar.lane_1_bowling_machine
      offset: "-0:05:00"
  conditions:
    - condition: state
      entity_id: input_boolean.bay1_blocked
      state: 'off'
  actions:
    - variables:
        door_code: >-
          {{ (trigger.calendar_event.description or '')
             | regex_findall('DOOR CODE: (\d+)') | first | default('') }}
        customer_name: >-
          {{ (trigger.calendar_event.description or '')
             | regex_findall('Customer: (.+)') | first | default('Guest') | trim }}
        booking_title: "{{ trigger.calendar_event.summary | default('Booking') }}"
    - if:
        - condition: template
          value_template: "{{ door_code != '' }}"
      then:
        - action: lock_code_manager.set_usercode
          data:
            lock_entity_id: lock.front_door_lock
            code_slot: 1
            usercode: "{{ door_code }}"
    - action: script.bay1_activate_script
      data: {}
    - action: notify.notify
      data:
        title: "\U0001f3cf Bay 1 Starting in 5 min"
        message: >-
          {{ customer_name }} | {{ booking_title }}.
          {% if door_code != '' %}Door code: {{ door_code }}.{% else %}No door code on this booking.{% endif %}
  mode: single

- id: 'bay1_booking_end'
  alias: Bay 1 Booking - END
  description: >
    At booking end: clear door code from lock, turn off Bay 1 lights.
    If no other bays are active, turn off general lights too.
  triggers:
    - trigger: calendar
      event: end
      entity_id: calendar.lane_1_bowling_machine
  actions:
    - variables:
        door_code: >-
          {{ (trigger.calendar_event.description or '')
             | regex_findall('DOOR CODE: (\d+)') | first | default('') }}
    - if:
        - condition: template
          value_template: "{{ door_code != '' }}"
      then:
        - action: lock_code_manager.clear_usercode
          data:
            lock_entity_id: lock.front_door_lock
            code_slot: 1
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.bay1_helper
    - action: light.turn_off
      target:
        entity_id: light.highbay_1
    - condition: template
      value_template: >-
        {{ is_state('input_boolean.bay2_helper', 'off') and
           is_state('input_boolean.bay3_helper', 'off') and
           is_state('input_boolean.bay4_helper', 'off') and
           is_state('input_boolean.bay5_helper', 'off') }}
    - action: script.scene_general_off
      data: {}
  mode: single

