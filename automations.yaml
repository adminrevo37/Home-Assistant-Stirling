###############################################################################
# BAY 1 — WEBHOOK ACCESS (manual trigger, e.g. from booking platform)
###############################################################################
- id: '1773291498207'
  alias: Booking BAY1 Access - Webhook
  description: Open Door Turn on Lights
  triggers:
  - trigger: webhook
    allowed_methods:
    - POST
    - PUT
    local_only: true
    webhook_id: -jWhm-ATigP7s_EHhGwXxgROk
  conditions:
  - condition: state
    entity_id: input_boolean.bay1_blocked
    state:
    - 'off'
  actions:
  - action: script.bay1_activate_script
    metadata: {}
    data: {}
  - action: input_boolean.turn_on
    metadata: {}
    target:
      entity_id: input_boolean.bay1_helper
    data: {}
  mode: single

###############################################################################
# SAFETY — Lights left on when nobody is there
###############################################################################
- id: '1779256315851'
  alias: Lights ON Nobody There
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.main_occupancy_probability
    for:
      hours: 1
      minutes: 0
      seconds: 0
    below: 30
  conditions:
  - condition: state
    entity_id:
    - light.office_downlights
    - light.fluro_x_4
    - light.inside_wall_lights
    - light.mezzanine_wall_lights
    - light.outside_wall_lights
    - light.exhaust_fan_1
    - light.exhaust_fan_2
    - light.highbay_1
    - light.highbay_2
    - light.highbay_3
    - light.highbay_4
    - light.highbay_5
    state:
    - 'on'
    for:
      hours: 1
      minutes: 0
      seconds: 0
  actions:
  - action: script.notify_script
    metadata: {}
    data: {}
  mode: single

###############################################################################
# GIT SYNC — Nightly push to GitHub at 2am
###############################################################################
- id: 'auto_git_push'
  alias: Auto Push Config to GitHub
  description: Nightly 2am push of HA config changes to GitHub
  triggers:
    - trigger: time
      at: "02:00:00"
  actions:
    - action: shell_command.git_push
      response_variable: push_result
    - if:
        - condition: template
          value_template: "{{ push_result.returncode != 0 }}"
      then:
        - action: persistent_notification.create
          data:
            title: "GitHub Push Failed"
            message: >
              Auto-push to GitHub failed at 2am.
              Your PAT token may have expired.
              Error: {{ push_result.stderr }}
  mode: single

###############################################################################
# GIT SYNC — Pull from GitHub when repo is updated
###############################################################################
- id: 'github_deploy_webhook'
  alias: Deploy from GitHub
  description: Pulls latest config from GitHub when a push is made to the repo
  triggers:
    - trigger: webhook
      webhook_id: "7k2p9x4m3n8q1r5f"
      local_only: false
  actions:
    - action: shell_command.git_pull
    - delay: "00:00:05"
    - action: homeassistant.reload_all
  mode: single

###############################################################################
# SUNSET TRANSITION — Activate neighbour highbays 30 min before sunset
# Fires once per day at sunset-30min. For any bay that is currently booked,
# turns on its neighbouring highbays so neighbour coverage starts before dark.
###############################################################################
- id: 'sunset_neighbour_activate'
  alias: Sunset - Activate Neighbour Highbays
  description: >
    30 min before sunset: for any active booking, turn on neighbour highbays.
    Bay 1: +hb2 | Bay 2: +hb1,hb3 | Bay 3: +hb2,hb4 | Bay 4: +hb3,hb5 | Bay 5: +hb4
  triggers:
    - trigger: sun
      event: sunset
      offset: "-0:30:00"
  actions:
    # Bay 1 active: add highbay 2 as neighbour (hb1 already on)
    - if:
        - condition: state
          entity_id: input_boolean.bay1_helper
          state: 'on'
      then:
        - action: light.turn_on
          target:
            entity_id: light.highbay_2
    # Bay 2 active: add highbays 1 and 3 (hb2 already on)
    - if:
        - condition: state
          entity_id: input_boolean.bay2_helper
          state: 'on'
      then:
        - action: light.turn_on
          target:
            entity_id:
              - light.highbay_1
              - light.highbay_3
    # Bay 3 active: add highbays 2 and 4 (hb3 already on)
    - if:
        - condition: state
          entity_id: input_boolean.bay3_helper
          state: 'on'
      then:
        - action: light.turn_on
          target:
            entity_id:
              - light.highbay_2
              - light.highbay_4
    # Bay 4 active: add highbays 3 and 5 (hb4 already on)
    - if:
        - condition: state
          entity_id: input_boolean.bay4_helper
          state: 'on'
      then:
        - action: light.turn_on
          target:
            entity_id:
              - light.highbay_3
              - light.highbay_5
    # Bay 5 active: add highbay 4 (hb5 already on)
    - if:
        - condition: state
          entity_id: input_boolean.bay5_helper
          state: 'on'
      then:
        - action: light.turn_on
          target:
            entity_id: light.highbay_4
  mode: single

###############################################################################
# NIGHT — Staggered shutdown when all bays close after dark
# When the last bay helper goes off after sunset: turn all highbays off, then
# leave highbay 3 on as a residual safety light until the building clears.
###############################################################################
- id: 'night_staggered_shutdown'
  alias: Night - Staggered Shutdown
  description: >
    When all 5 bay helpers go off after dark: cut all highbays, then bring
    highbay 3 back on as residual safety light.
  triggers:
    - trigger: state
      entity_id:
        - input_boolean.bay1_helper
        - input_boolean.bay2_helper
        - input_boolean.bay3_helper
        - input_boolean.bay4_helper
        - input_boolean.bay5_helper
      to: 'off'
  conditions:
    - condition: state
      entity_id: sun.sun
      state: below_horizon
    - condition: template
      value_template: >-
        {{ is_state('input_boolean.bay1_helper', 'off') and
           is_state('input_boolean.bay2_helper', 'off') and
           is_state('input_boolean.bay3_helper', 'off') and
           is_state('input_boolean.bay4_helper', 'off') and
           is_state('input_boolean.bay5_helper', 'off') }}
  actions:
    # Cut all highbays
    - action: light.turn_off
      target:
        entity_id:
          - light.highbay_1
          - light.highbay_2
          - light.highbay_3
          - light.highbay_4
          - light.highbay_5
    # Residual: highbay 3 stays on as safety light while anyone remains
    - action: light.turn_on
      target:
        entity_id: light.highbay_3
  mode: single

###############################################################################
# NIGHT — Turn off highbay 3 residual when building clears
# Fires when occupancy drops below 35% after dark with all bays empty.
# No delay - turns off immediately at threshold.
###############################################################################
- id: 'night_highbay3_off'
  alias: Night - Highbay 3 Residual Off
  description: >
    After dark, all bookings done: turn off residual highbay 3 when
    occupancy drops below 35%.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.main_occupancy_probability
      below: 40
  conditions:
    - condition: state
      entity_id: sun.sun
      state: below_horizon
    - condition: template
      value_template: >-
        {{ is_state('input_boolean.bay1_helper', 'off') and
           is_state('input_boolean.bay2_helper', 'off') and
           is_state('input_boolean.bay3_helper', 'off') and
           is_state('input_boolean.bay4_helper', 'off') and
           is_state('input_boolean.bay5_helper', 'off') }}
    - condition: state
      entity_id: light.highbay_3
      state: 'on'
  actions:
    - action: light.turn_off
      target:
        entity_id: light.highbay_3
  mode: single

###############################################################################
# NIGHT — Common lights off when building is empty
# Fires when occupancy is below 11% for 1 full minute after dark, all bays done.
###############################################################################
- id: 'night_common_lights_occupancy_off'
  alias: Night - Common Lights Occupancy Off
  description: >
    After dark, all bookings done: turn off common lights when occupancy
    stays below 11% for 1 minute.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.main_occupancy_probability
      below: 40
      for:
        minutes: 1
  conditions:
    - condition: state
      entity_id: sun.sun
      state: below_horizon
    - condition: template
      value_template: >-
        {{ is_state('input_boolean.bay1_helper', 'off') and
           is_state('input_boolean.bay2_helper', 'off') and
           is_state('input_boolean.bay3_helper', 'off') and
           is_state('input_boolean.bay4_helper', 'off') and
           is_state('input_boolean.bay5_helper', 'off') }}
  actions:
    - action: light.turn_off
      target:
        entity_id:
          - light.inside_wall_lights
          - light.fluro_x_4
          - light.mezzanine_wall_lights
  mode: single

###############################################################################
# NIGHT — Common lights on when entry motion detected
# Fires when the Pier Facing Entry CCTV detects motion after dark.
# Covers the scenario where a customer arrives before their bay light
# turns on (bay light fires 5 min before booking, CCTV fires on arrival).
# Entity: binary_sensor.pier_facing_entry_motion (Frigate)
###############################################################################
- id: 'night_common_lights_motion_on'
  alias: Night - Common Lights On (Entry Motion)
  description: >
    After dark: turn on common lights when Pier Facing Entry CCTV detects
    motion (roller door opening etc).
  triggers:
    - trigger: state
      entity_id: binary_sensor.pier_facing_entry_cctv_motion
      to: 'on'
  conditions:
    - condition: template
      value_template: >-
        {{ is_state('sun.sun', 'below_horizon') or
           (is_state('sun.sun', 'above_horizon') and
            (as_timestamp(state_attr('sun.sun', 'next_setting')) - as_timestamp(now())) < 1800) }}
  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.inside_wall_lights
          - light.fluro_x_4
          - light.mezzanine_wall_lights
  mode: single

###############################################################################
# FALLBACK — Hard cutoff: all highbays + common lights off at 10:30pm
# Safety net for lights left on after hours.
###############################################################################
- id: 'fallback_1030pm'
  alias: Fallback - All Lights Off at 10:30pm
  description: >
    Hard fallback: force off all highbays and common lights at 10:30pm
    regardless of booking state.
  triggers:
    - trigger: time
      at: "22:30:00"
  actions:
    - action: light.turn_off
      target:
        entity_id:
          - light.highbay_1
          - light.highbay_2
          - light.highbay_3
          - light.highbay_4
          - light.highbay_5
          - light.inside_wall_lights
          - light.fluro_x_4
          - light.mezzanine_wall_lights
  mode: single

###############################################################################
# DOOR CODES — BAY 1 ACTIVATE (fires 15 min before booking start)
# Finds first free slot (11/12/13), programs code on DS3, stores in helper.
###############################################################################
- id: 'bay1_code_activate'
  alias: Bay 1 - Door Code Activate
  triggers:
    - trigger: calendar
      event: start
      entity_id: calendar.lane_1_bowling_machine
      offset: "-0:15:00"
  actions:
    - variables:
        door_code: >-
          {{ (trigger.calendar_event.description or '')
             | regex_findall('DOOR CODE: ([\d ]+)') | first | default('')
             | replace(' ', '') | trim }}
        customer_name: >-
          {{ (trigger.calendar_event.description or '')
             | regex_findall('Customer: (.+)') | first | default('Guest') | trim }}
    - condition: template
      value_template: "{{ door_code != '' }}"
    - variables:
        slot_to_use: >-
          {% if states('input_text.bay1_code_slot_a') == '' %}11
          {% elif states('input_text.bay1_code_slot_b') == '' %}12
          {% elif states('input_text.bay1_code_slot_c') == '' %}13
          {% else %}0{% endif %}
    - condition: template
      value_template: "{{ slot_to_use | int > 0 }}"
    - action: shell_command.c4_set_code
      data:
        slot: "{{ slot_to_use }}"
        code: "{{ door_code }}"
        name: "{{ customer_name }}"
    - if:
        - condition: template
          value_template: "{{ slot_to_use | int == 11 }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.bay1_code_slot_a
          data:
            value: "{{ door_code }}:{{ customer_name }}"
    - if:
        - condition: template
          value_template: "{{ slot_to_use | int == 12 }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.bay1_code_slot_b
          data:
            value: "{{ door_code }}:{{ customer_name }}"
    - if:
        - condition: template
          value_template: "{{ slot_to_use | int == 13 }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.bay1_code_slot_c
          data:
            value: "{{ door_code }}:{{ customer_name }}"
  mode: single

###############################################################################
# DOOR CODES — BAY 1 DEACTIVATE (fires 15 min after booking end)
###############################################################################
- id: 'bay1_code_deactivate'
  alias: Bay 1 - Door Code Deactivate
  triggers:
    - trigger: calendar
