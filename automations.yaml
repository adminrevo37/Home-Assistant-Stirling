###############################################################################
# ROLLER DOOR — Open/Close detection via Aqara contact sensor
#
# *** BEFORE THIS WORKS ***
# 1. Pair your Aqara Door & Window sensor in Zigbee2MQTT
# 2. Give it a friendly name (e.g. "Roller Door")
# 3. Replace ALL occurrences of  binary_sensor.roller_door_contact  below
#    with the actual entity_id HA created (Developer Tools → States, search
#    your sensor name — typically  binary_sensor.<name>_contact)
#
# Sensor states:  on = door OPEN (contact broken)
#                 off = door CLOSED (contact made)
#
# Timeline after door opens:
#   T+1:15  → attempt 1: send LOCK to Control4 (if still open)
#   T+1:40  → attempt 2: send LOCK again (if still open)
#   T+2:00  → if still open: snapshot camera.pier_facing_entry + notify all staff
#
# Mode restart: if door opens again mid-sequence, timer resets from zero.
# Each close attempt is conditional — won't fire if door already closed.
###############################################################################

- id: 'roller_door_opened_notify'
  alias: Roller Door - Notify Staff on Open
  description: >
    Immediately notifies all staff when the roller door opens.
  triggers:
    - trigger: state
      entity_id: binary_sensor.roller_door_contact   # <-- UPDATE after pairing
      to: 'on'
  actions:
    - action: notify.notify
      data:
        title: "🚪 Roller Door Opened"
        message: "The front roller door has been opened."
  mode: single

- id: 'roller_door_auto_close'
  alias: Roller Door - Auto Close + Alert if Left Open
  description: >
    After door opens: two LOCK attempts then a snapshot + staff alert.
    Timings are configurable via:
      input_number.door_close_attempt1_secs  (default 75s)
      input_number.door_close_attempt2_secs  (default 25s after attempt 1)
      input_number.door_close_alert_secs     (default 20s after attempt 2)
    Total default = 120s (2 min). Mode restart: resets if door reopens.
  triggers:
    - trigger: state
      entity_id: binary_sensor.roller_door_contact   # <-- UPDATE after pairing
      to: 'on'
  actions:
    # ── Attempt 1 (configurable — default T+75s) ─────────────────────────────
    - delay:
        seconds: "{{ states('input_number.door_close_attempt1_secs') | int(75) }}"
    - condition: state
      entity_id: binary_sensor.roller_door_contact   # <-- UPDATE after pairing
      state: 'on'
    - action: shell_command.c4_lock_door

    # ── Attempt 2 (configurable — default +25s after attempt 1) ─────────────
    - delay:
        seconds: "{{ states('input_number.door_close_attempt2_secs') | int(25) }}"
    - condition: state
      entity_id: binary_sensor.roller_door_contact   # <-- UPDATE after pairing
      state: 'on'
    - action: shell_command.c4_lock_door

    # ── Alert (configurable — default +20s after attempt 2) ──────────────────
    - delay:
        seconds: "{{ states('input_number.door_close_alert_secs') | int(20) }}"
    - condition: state
      entity_id: binary_sensor.roller_door_contact   # <-- UPDATE after pairing
      state: 'on'
    # Grab a snapshot from the pier entry camera
    - action: camera.snapshot
      target:
        entity_id: camera.pier_facing_entry
      data:
        filename: /config/www/door_alert_snapshot.jpg
    # Brief pause to ensure the image file is fully written before sending
    - delay: "00:00:02"
    # Notify all staff with the snapshot attached
    - action: notify.notify
      data:
        title: "🚨 Front Door Open 2 Min"
        message: "The front roller door has been open for 2 minutes. Please check entry."
        data:
          image: /local/door_alert_snapshot.jpg
  mode: restart
