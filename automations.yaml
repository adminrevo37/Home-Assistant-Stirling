- id: '1773215301454'
  alias: Booking Bay 1 - Calendar
  description: ''
  use_blueprint:
    path: Blackshome/calendar-notifications-and-actions.yaml
    input:
      calendar: calendar.lane_1_bowling_machine
      include_calendar_trigger: disable_key_word
      start_calendar_offset:
        hours: 0
        minutes: -5
        seconds: 0
        days: 0
      start_action_1:
      - action: script.turn_on
        metadata: {}
        target:
          entity_id: script.bay1_activate_script
        data: {}
      - action: input_boolean.turn_on
        metadata: {}
        target:
          entity_id: input_boolean.bay1_helper
        data: {}
      include_end_auto_actions:
      - enable_end_action_1
      include_start_auto_actions:
      - enable_start_action_1
      end_action_1:
      - action: light.turn_off
        metadata: {}
        target:
          entity_id: light.highbay_1
        data: {}
      - action: input_boolean.turn_off
        metadata: {}
        target:
          entity_id: input_boolean.bay1_helper
        data: {}
      global_conditions:
      - condition: state
        entity_id: input_boolean.bay1_blocked
        state:
        - 'off'
      end_time_delay:
        hours: 0
        minutes: 0
        seconds: 0
      end_calendar_offset:
        hours: 0
        minutes: 5
        seconds: 0
        days: 0
      start_notify_device:
      - 34199ea861173546a72af6f7fbb34b8f
      start_title: Bay1 Booking Start
      include_start_notify: enable_start_notify_options
      include_end_notify: enable_end_notify_options
