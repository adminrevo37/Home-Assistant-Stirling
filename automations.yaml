          {% elif states('input_text.bay1_code_slot_b').split(':')[0] == door_code %}12
          {% elif states('input_text.bay1_code_slot_c').split(':')[0] == door_code %}13
          {% else %}0{% endif %}
    - condition: template
      value_template: "{{ slot_to_clear | int > 0 }}"
    - action: shell_command.c4_clear_code
      data:
        slot: "{{ slot_to_clear }}"
    - if:
        - condition: template
          value_template: "{{ slot_to_clear | int == 11 }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.bay1_code_slot_a
          data:
            value: ""
    - if:
        - condition: template
          value_template: "{{ slot_to_clear | int == 12 }}"
      then:
        - action: input_text.set_value
          target:
