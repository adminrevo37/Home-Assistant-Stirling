- id: c4_entry_log_poll
  alias: C4 Entry Log - Poll Every Minute
  triggers:
  - trigger: time_pattern
    minutes: /1
  actions:
  - action: shell_command.c4_entry_log
- id: door_visual_sensor_poll
  alias: Roller Door - Visual Sensor Poll
  description: 'Every 15 s: snapshot pier_facing_entry camera, run c4_door_visual.py,
    update input_boolean.roller_door_visual_open.

    '
  triggers:
  - trigger: time_pattern
    seconds: /15
  actions:
  - action: camera.snapshot
    target:
      entity_id: camera.pier_facing_entry
    data:
      filename: /config/www/door_check_latest.jpg
  - action: shell_command.c4_door_visual_check
    response_variable: visual_result
  - if:
    - condition: template
      value_template: '{{ ''open'' in (visual_result.stdout | default('''')) }}'
    then:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.roller_door_visual_open
    else:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.roller_door_visual_open
  mode: single
- id: roller_door_opened_notify
  alias: Roller Door - Notify Staff on Open
  description: Notifies staff when the front roller door opens. Rewired 2026-05-31
    from the vision boolean to the Zigbee contact sensor (binary_sensor.roller_door_contact)
    — clean signal, ends the vision false-positives.
  triggers:
  - trigger: state
    entity_id: binary_sensor.roller_door_contact
    from: 'off'
    to: 'on'
    for: 00:00:03
  conditions: []
  actions:
  - action: notify.notify
    data:
      title: "\U0001F6AA Roller Door Opened"
      message: The front roller door has been opened.
  mode: single
- id: roller_door_auto_close
  alias: Roller Door - Auto Close + Alert if Left Open
  description: "After door opens: two LOCK+UNLOCK close attempts then a snapshot +
    staff alert. LOCK resets C4 state; UNLOCK triggers the motor (toggle close from
    open limit). Timings are configurable via:\n  input_number.door_close_attempt1_secs
    \ (calibrated 60s = 19s motor travel + 41s entry buffer)\n  input_number.door_close_attempt2_secs
    \ (calibrated 35s after attempt 1 — ensures visual sensor has updated after close)\n
    \ input_number.door_close_alert_secs     (calibrated 20s after attempt 2)\nTotal
    window = 115s. Mode restart: resets if door reopens.\n"
  triggers:
  - trigger: state
    entity_id: input_boolean.roller_door_visual_open
    to: 'on'
  actions:
  - condition: state
    entity_id: input_boolean.door_service_mode
    state: 'off'
  - delay:
      seconds: '{{ states(''input_number.door_close_attempt1_secs'') | int(75) }}'
  - condition: state
    entity_id: input_boolean.roller_door_visual_open
    state: 'on'
  - action: shell_command.c4_lock_door
  - delay: 00:00:01
  - action: shell_command.c4_unlock_door
  - delay:
      seconds: '{{ states(''input_number.door_close_attempt2_secs'') | int(25) }}'
  - condition: state
    entity_id: input_boolean.roller_door_visual_open
    state: 'on'
  - action: shell_command.c4_lock_door
  - delay: 00:00:01
  - action: shell_command.c4_unlock_door
  - delay:
      seconds: '{{ states(''input_number.door_close_alert_secs'') | int(20) }}'
  - condition: state
    entity_id: input_boolean.roller_door_visual_open
    state: 'on'
  - action: camera.snapshot
    target:
      entity_id: camera.pier_facing_entry
    data:
      filename: /config/www/door_alert_snapshot.jpg
  - delay: 00:00:02
  - action: notify.notify
    data:
      title: "\U0001F6A8 Front Door Open 2 Min"
      message: The front roller door has been open for 2 minutes. Please check entry.
      data:
        image: /local/door_alert_snapshot.jpg
  mode: restart
- id: '1780070397691'
  alias: Night - Activate Neighbour Highbays on Bay Start
  description: 'Safety net: when any bay_helper turns ON during dusk/night (sun within
    45 min of setting or already set), immediately activate the correct neighbour
    highbays. Closes race condition where booking_start fires just outside the 30-min
    night window. Idempotent — turning on an already-on light has no effect.'
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.bay1_helper
    - input_boolean.bay2_helper
    - input_boolean.bay3_helper
    - input_boolean.bay4_helper
    - input_boolean.bay5_helper
    to: 'on'
  conditions:
  - condition: template
    value_template: '{{ is_state(''sun.sun'', ''below_horizon'') or (is_state(''sun.sun'',
      ''above_horizon'') and (as_timestamp(state_attr(''sun.sun'', ''next_setting''))
      - as_timestamp(now())) < 2700) }}'
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.entity_id == ''input_boolean.bay1_helper'' }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.highbay_2
    - conditions:
      - condition: template
        value_template: '{{ trigger.entity_id == ''input_boolean.bay2_helper'' }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.highbay_1
          - light.highbay_3
    - conditions:
      - condition: template
        value_template: '{{ trigger.entity_id == ''input_boolean.bay3_helper'' }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.highbay_2
          - light.highbay_4
    - conditions:
      - condition: template
        value_template: '{{ trigger.entity_id == ''input_boolean.bay4_helper'' }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.highbay_3
          - light.highbay_5
    - conditions:
      - condition: template
        value_template: '{{ trigger.entity_id == ''input_boolean.bay5_helper'' }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.highbay_4
  mode: parallel
  max: 5
- id: '1780149350644'
  alias: Common Lights - On (Front Door Opened)
  description: 'Front door unlocked (booking code entry / exit button) -> turn on
    common lights. Primary arrival trigger; occupancy>threshold is the backstop. NOTE:
    assumes a DS3 code entry surfaces as lock.front_door_lock -> unlocked; verify
    on-site.'
  triggers:
  - trigger: state
    entity_id: lock.front_door_lock
    to: unlocked
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.inside_wall_lights
      - light.fluro_x_4
      - light.mezzanine_wall_lights
  mode: single
- id: '1780149352883'
  alias: Common Lights - On (Occupancy Rises)
  description: Occupancy rises above the configured threshold -> ensure common lights
    on. Backstop to door-open arrival trigger.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.main_occupancy_probability
    above: input_number.lighting_occupancy_threshold
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.inside_wall_lights
      - light.fluro_x_4
      - light.mezzanine_wall_lights
  mode: single
- id: '1780149356921'
  alias: Common Lights - Off (Empty + No Booking)
  description: Occupancy at/below threshold AND no active booking -> turn off common
    lights. Re-checking (debounced threshold-cross + every 5 min) catches an already-empty
    building. Booking-active guard prevents mid-session darkness.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.main_occupancy_probability
    below: input_number.lighting_occupancy_threshold
    for:
      minutes: '{{ states(''input_number.lighting_common_off_debounce_min'') | int(4)
        }}'
  - trigger: time_pattern
    minutes: /5
  conditions:
  - condition: numeric_state
    entity_id: sensor.main_occupancy_probability
    below: input_number.lighting_occupancy_threshold
  - condition: state
    entity_id:
    - calendar.lane_1_bowling_machine
    - calendar.lane_2_bowling_machine
    - calendar.lane_3_truman_or_bowling_machine
    - calendar.lane_4_run_up_net
    - calendar.lane_5_run_up_net
    state: 'off'
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.inside_wall_lights
      - light.fluro_x_4
      - light.mezzanine_wall_lights
  mode: single
- id: '1780149360935'
  alias: Lighting - End-of-Day Hard Off (after last booking)
  description: Configurable delay after a booking ends with no active booking -> force
    all highbays + common lights off. Time-based backstop (not occupancy-gated) so
    lights can't be stranded on.
  triggers:
  - trigger: state
    entity_id:
    - calendar.lane_1_bowling_machine
    - calendar.lane_2_bowling_machine
    - calendar.lane_3_truman_or_bowling_machine
    - calendar.lane_4_run_up_net
    - calendar.lane_5_run_up_net
    to: 'off'
    for:
      minutes: '{{ states(''input_number.lighting_endofday_delay_min'') | int(30)
        }}'
  conditions:
  - condition: state
    entity_id:
    - calendar.lane_1_bowling_machine
    - calendar.lane_2_bowling_machine
    - calendar.lane_3_truman_or_bowling_machine
    - calendar.lane_4_run_up_net
    - calendar.lane_5_run_up_net
    state: 'off'
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.highbay_1
      - light.highbay_2
      - light.highbay_3
      - light.highbay_4
      - light.highbay_5
      - light.inside_wall_lights
      - light.fluro_x_4
      - light.mezzanine_wall_lights
  mode: single
- id: '1780149364218'
  alias: Lighting - Absolute All-Off Catch-All
  description: 'Absolute backstop: at the configured catch-all time (default 23:00),
    force all highbays + common lights off regardless of state. Covers zero-booking
    days and any night the dynamic hard-off did not arm.'
  triggers:
  - trigger: time
    at: input_datetime.lighting_hard_off_catchall
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.highbay_1
      - light.highbay_2
      - light.highbay_3
      - light.highbay_4
      - light.highbay_5
      - light.inside_wall_lights
      - light.fluro_x_4
      - light.mezzanine_wall_lights
  mode: single
- id: '1780149365937'
  alias: Office Lights - Scheduled Off Sweep
  description: At the three configured times (default 18:00/20:00/22:00) turn off
    office downlights - catches staff leaving them on. Default hard-off (no occupancy
    guard; binary_sensor.pier_facing_office_all_occupancy available if a guard is
    wanted later).
  triggers:
  - trigger: time
    at: input_datetime.office_off_1
  - trigger: time
    at: input_datetime.office_off_2
  - trigger: time
    at: input_datetime.office_off_3
  actions:
  - action: light.turn_off
    target:
      entity_id: light.office_downlights
  mode: single
- id: '1780149372942'
  alias: Exterior Lights - Manage (Stay On / Off)
  description: 'Every 15 min: keep exterior on while a booking is active and it''s
    dark; turn exterior off when no booking is active (~15 min departure buffer).
    Only acts in the dark / when already on.'
  triggers:
  - trigger: time_pattern
    minutes: /15
  actions:
  - choose:
    - conditions:
      - condition: sun
        after: sunset
      - condition: or
        conditions:
        - condition: state
          entity_id: calendar.lane_1_bowling_machine
          state: 'on'
        - condition: state
          entity_id: calendar.lane_2_bowling_machine
          state: 'on'
        - condition: state
          entity_id: calendar.lane_3_truman_or_bowling_machine
          state: 'on'
        - condition: state
          entity_id: calendar.lane_4_run_up_net
          state: 'on'
        - condition: state
          entity_id: calendar.lane_5_run_up_net
          state: 'on'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.outside_wall_lights
    - conditions:
      - condition: state
        entity_id:
        - calendar.lane_1_bowling_machine
        - calendar.lane_2_bowling_machine
        - calendar.lane_3_truman_or_bowling_machine
        - calendar.lane_4_run_up_net
        - calendar.lane_5_run_up_net
        state: 'off'
      - condition: state
        entity_id: light.outside_wall_lights
        state: 'on'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.outside_wall_lights
  mode: single
- id: '1780149384391'
  alias: Exterior Lights - On (Before Booking, Dark Only)
  description: 12 min before any booking start, if dark (sun below horizon), turn
    on the outside wall lights.
  triggers:
  - trigger: calendar
    event: start
    entity_id: calendar.lane_1_bowling_machine
    offset: -0:12:00
  - trigger: calendar
    event: start
    entity_id: calendar.lane_2_bowling_machine
    offset: -0:12:00
  - trigger: calendar
    event: start
    entity_id: calendar.lane_3_truman_or_bowling_machine
    offset: -0:12:00
  - trigger: calendar
    event: start
    entity_id: calendar.lane_4_run_up_net
    offset: -0:12:00
  - trigger: calendar
    event: start
    entity_id: calendar.lane_5_run_up_net
    offset: -0:12:00
  conditions:
  - condition: sun
    after: sunset
  actions:
  - action: light.turn_on
    target:
      entity_id: light.outside_wall_lights
  mode: single
- id: temp_clear_keypad_test_slot12
  alias: TEMP - Clear keypad test code slot 12
  description: 'One-shot: clears the manual keypad-test code from DS3 slot 12 at 17:23
    AWST, then disables itself. Created for on-site door-code test 2026-05-31.'
  triggers:
  - trigger: time
    at: '17:23:00'
  conditions: []
  actions:
  - action: shell_command.c4_clear_code
    data:
      slot: '12'
  - action: persistent_notification.create
    data:
      title: Keypad test code cleared
      message: Slot 12 (code 8164) auto-cleared from the DS3 at 17:23. This temp automation
        has disabled itself.
  - action: automation.turn_off
    target:
      entity_id: automation.temp_clear_keypad_test_code_slot_12
  mode: single
- id: roller_door_failed_to_close
  alias: Roller Door - Failed to Close Alert
  description: 'Fault alert: if the contact sensor stays OPEN longer than a full normal
    auto-close cycle (~67s = 18s open + 30s ACLS dwell + 18s close), the operator''s
    auto-close likely failed (obstruction / beam fault / power). Threshold 110s. Snapshot
    + notify. Suppressed in service/hold-open mode. Built 2026-05-31 to replace the
    retired vision-based auto-close (operator now closes itself via ACLS; HA only
    monitors).'
  triggers:
  - trigger: state
    entity_id: binary_sensor.roller_door_contact
    to: 'on'
    for: 00:01:50
  conditions:
  - condition: state
    entity_id: input_boolean.door_service_mode
    state: 'off'
  actions:
  - action: camera.snapshot
    target:
      entity_id: camera.pier_facing_entry
    data:
      filename: /config/www/door_alert_snapshot.jpg
  - delay: 00:00:02
  - action: notify.notify
    data:
      title: "\U0001F6A8 Roller Door Failed to Close"
      message: The front roller door has been open ~2 min — the operator auto-close
        may have failed (obstruction, safety-beam fault, or power). Please check entry.
      data:
        image: /local/door_alert_snapshot.jpg
  mode: single
