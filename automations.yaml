             | regex_findall('DOOR CODE: ([\d ]+)') | first | default('')
             | replace(' ', '') | trim }}
        customer_name: >-
          {{ (trigger.calendar_event.description or '')
             | regex_findall('Customer: (.+)') | first | default('Guest') | trim }}
    - condition: template
      value_template: "{{ door_code != '' }}"
    - variables:
        slot_to_use: >-
          {% if states('input_text.bay5_code_slot_a') == '' %}23
          {% elif states('input_text.bay5_code_slot_b') == '' %}24
          {% elif states('input_text.bay5_code_slot_c') == '' %}25
          {% else %}0{% endif %}
    - condition: template
      value_template: "{{ slot_to_use | int > 0 }}"
    - action: shell_command.c4_set_code
      data:
        slot: "{{ slot_to_use }}"
        code: "{{ door_code }}"
        name: "{{ customer_name }}"
    - if:
        - condition: template
          value_template: "{{ slot_to_use | int == 23 }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.bay5_code_slot_a
          data:
            value: "{{ door_code }}:{{ customer_name }}"
    - if:
        - condition: template
          value_template: "{{ slot_to_use | int == 24 }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.bay5_code_slot_b
          data:
            value: "{{ door_code }}:{{ customer_name }}"
    - if:
        - condition: template
          value_template: "{{ slot_to_use | int == 25 }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.bay5_code_slot_c
          data:
            value: "{{ door_code }}:{{ customer_name }}"
  mode: single

- id: 'bay5_code_deactivate'
  alias: Bay 5 - Door Code Deactivate
  triggers:
    - trigger: calendar
      event: end
      entity_id: calendar.lane_5_run_up_net
      offset: "0:15:00"
  actions:
    - variables:
        door_code: >-
          {{ (trigger.calendar_event.description or '')
             | regex_findall('DOOR CODE: ([\d ]+)') | first | default('')
             | replace(' ', '') | trim }}
    - condition: template
      value_template: "{{ door_code != '' }}"
    - variables:
        slot_to_clear: >-
          {% if states('input_text.bay5_code_slot_a').split(':')[0] == door_code %}23
          {% elif states('input_text.bay5_code_slot_b').split(':')[0] == door_code %}24
          {% elif states('input_text.bay5_code_slot_c').split(':')[0] == door_code %}25
          {% else %}0{% endif %}
    - condition: template
      value_template: "{{ slot_to_clear | int > 0 }}"
    - action: shell_command.c4_clear_code
      data:
        slot: "{{ slot_to_clear }}"
    - if:
        - condition: template
          value_template: "{{ slot_to_clear | int == 23 }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.bay5_code_slot_a
          data:
            value: ""
    - if:
        - condition: template
          value_template: "{{ slot_to_clear | int == 24 }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.bay5_code_slot_b
          data:
            value: ""
    - if:
        - condition: template
          value_template: "{{ slot_to_clear | int == 25 }}"
      then:
        - action: input_text.set_value
          target:
            entity_id: input_text.bay5_code_slot_c
          data:
            value: ""
  mode: single

